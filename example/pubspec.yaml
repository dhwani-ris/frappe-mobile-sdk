name: frappe_mobile_sdk_example
description: Example app demonstrating Frappe Mobile SDK usage
publish_to: 'none'

version: 1.1.0-dev

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  frappe_mobile_sdk: ^1.0.0

# For local development in this repository, uncomment this override:
dependency_overrides:
  frappe_mobile_sdk:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  image: ^4.5.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "../logo.png"

flutter:
  uses-material-design: true
