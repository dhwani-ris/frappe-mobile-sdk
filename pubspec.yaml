name: frappe_mobile_sdk
description: A Flutter SDK for building mobile applications powered by the Frappe Framework. Handles authentication, API communication, form rendering, and connectivity-aware data operations for field deployments.
version: 1.0.0
publish_to: 'none'
homepage: https://github.com/dhwani-ris/frappe-mobile-sdk
repository: https://github.com/dhwani-ris/frappe-mobile-sdk

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.1.0

  # Path utilities
  path: ^1.8.3

  # SQLite database
  sqflite: ^2.3.0

  # State Management
  provider: ^6.1.1

  # Form building
  flutter_form_builder: ^9.1.1

  # Date formatting
  intl: ^0.19.0

  # Connectivity check
  connectivity_plus: ^6.0.5

  # Path provider for database location
  path_provider: ^2.1.2

  # Secure storage for tokens
  flutter_secure_storage: ^9.0.0

  # OAuth PKCE
  crypto: ^3.0.3

  # Open OAuth URL in browser
  url_launcher: ^6.2.0

  # Deep links for OAuth redirect (auto-capture code)
  app_links: ^7.0.0

  # Package metadata (version, package name) for app status checks
  package_info_plus: ^9.0.0

  # UUID generation
  uuid: ^4.3.3

  # File picker for attachments
  file_picker: ^8.0.0+1

  # Image picker for image fields
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Pre-commit: format + analyze before commit (run: dart run flutter_pre_commit)
  flutter_pre_commit: ^0.2.4

  # SQLite FFI for testing
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
