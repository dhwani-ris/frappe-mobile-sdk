name: frappe_mobile_sdk
description: Offline-first Flutter package for Frappe/ERPNext integration with dynamic form rendering and bi-directional sync
version: 1.0.0+1
publish_to: 'none'
homepage: https://github.com/your-repo/frappe_mobile_sdk
repository: https://github.com/your-repo/frappe_mobile_sdk

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # ERPNext SDK for API calls
  erpnext_sdk_flutter: ^1.0.2

  # Room-like database (SQLite)
  floor: ^1.5.0
  sqflite: ^2.3.0

  # State Management
  provider: ^6.1.1

  # Form building
  flutter_form_builder: ^9.1.1

  # Date formatting
  intl: ^0.19.0

  # Connectivity check
  connectivity_plus: ^6.0.5

  # Path provider for database location
  path_provider: ^2.1.2

  # Secure storage for tokens
  flutter_secure_storage: ^9.0.0

  # JSON serialization
  json_annotation: ^4.8.1

  # UUID generation
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Floor code generator
  build_runner: ^2.4.8
  floor_generator: ^1.5.0
  
  # JSON serialization code generator
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
