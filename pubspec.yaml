name: frappe_mobile_sdk
description: Flutter package for Frappe integration with direct API access, dynamic form rendering, and offline-first architecture
version: 1.0.0+1
publish_to: 'none'
homepage: https://github.com/dhwani-ris/frappe-mobile-sdk
repository: https://github.com/dhwani-ris/frappe-mobile-sdk

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.1.0

  # Path utilities
  path: ^1.8.3

  # Room-like database (SQLite)
  floor: ^1.5.0
  sqflite: ^2.3.0

  # State Management
  provider: ^6.1.1

  # Form building
  flutter_form_builder: ^9.1.1

  # Date formatting
  intl: ^0.19.0

  # Connectivity check
  connectivity_plus: ^6.0.5

  # Path provider for database location
  path_provider: ^2.1.2

  # Secure storage for tokens
  flutter_secure_storage: ^9.0.0

  # OAuth PKCE
  crypto: ^3.0.3

  # Open OAuth URL in browser
  url_launcher: ^6.2.0

  # JSON serialization
  json_annotation: ^4.8.1

  # UUID generation
  uuid: ^4.3.3

  # File picker for attachments
  file_picker: ^8.0.0+1

  # Image picker for image fields
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Pre-commit: format + analyze before commit (run: dart run flutter_pre_commit)
  flutter_pre_commit: ^0.2.4

  # Floor code generator
  build_runner: ^2.4.8
  floor_generator: ^1.5.0

  # JSON serialization code generator
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
